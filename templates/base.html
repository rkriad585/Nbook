<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N-BOOK</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=VT323&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'nothing': ['VT323', 'monospace'],
                        'sans': ['Inter', 'sans-serif'],
                        'code': ['Fira Code', 'monospace'],
                    },
                    colors: {
                        'n-black': '#0a0a0a',
                        'n-red': '#D71921',
                    }
                }
            }
        }
    </script>
    
    <!-- CodeMirror Core -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-palenight.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    
    <!-- CodeMirror Modes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/markdown/markdown.min.js"></script>
    
    <!-- Addons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.js"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Logic -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
            color: #e5e5e5;
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .CodeMirror { background: transparent !important; font-family: 'Fira Code', monospace; height: auto; min-height: 80px; }
        .CodeMirror-gutters { background: transparent !important; border: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Markdown Styles */
        .prose h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; color: white; }
        .prose h2 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; color: #e5e5e5; }
        .prose p { margin-bottom: 0.5em; color: #d1d5db; }
        .prose code { background: rgba(255,255,255,0.1); padding: 2px 4px; rounded: 4px; font-family: monospace; }
        .prose pre { background: #111; padding: 1em; rounded: 8px; overflow-x: auto; }
        .prose a { color: #3b82f6; text-decoration: underline; }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col md:flex-row">
    {% block content %}{% endblock %}
</body>
</html>
