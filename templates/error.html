{% extends "base.html" %}

{% block content %}
<div class="w-full h-full flex flex-col items-center justify-center relative">
    <div class="absolute inset-0 bg-red-900/10 z-0"></div>
    
    <div class="z-10 text-center space-y-4">
        <h1 class="font-nothing text-8xl text-n-red tracking-widest">403</h1>
        <p class="font-sans text-xl text-gray-400">ACCESS DENIED</p>
        <div class="glass-panel p-6 rounded-2xl max-w-md mx-auto mt-8">
            <p class="text-sm text-gray-500 font-mono">
                Error: INVALID_API_KEY<br>
                Please start the server with <code class="text-white">python app.py free</code><br>
                or provide the correct key generated by <code class="text-white">python app.py start</code>.
            </p>
        </div>
    </div>
</div>
{% endblock %}
