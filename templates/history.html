{% extends "base.html" %}

{% block content %}
<div class="h-screen w-full flex flex-col relative overflow-hidden bg-[#0a0a0a]">
    <!-- Header -->
    <header class="h-20 flex items-center justify-between px-4 md:px-8 glass-panel z-10 border-b border-white/5">
        <h1 class="font-nothing text-2xl md:text-3xl text-white tracking-widest truncate">PROJECT <span class="text-n-red">HISTORY</span></h1>
        <a href="/" class="px-6 py-2 rounded-full border border-white/10 hover:bg-white/5 text-white text-xs font-bold transition flex-shrink-0">BACK TO EDITOR</a>
    </header>

    <!-- List -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 max-w-5xl mx-auto w-full">
        {% if notebooks %}
            <div class="grid gap-4">
                {% for nb in notebooks %}
                <div class="glass-panel p-4 md:p-6 rounded-2xl flex flex-col md:flex-row md:items-center justify-between group hover:border-white/20 transition-all duration-300 gap-4" id="nb-{{ nb.id }}">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3">
                            <h2 class="text-xl font-bold text-white truncate" id="title-{{ nb.id }}">{{ nb.title }}</h2>
                            <button onclick="renameHistory({{ nb.id }})" class="opacity-0 group-hover:opacity-100 transition text-gray-500 hover:text-white">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                        </div>
                        <span class="text-xs font-mono text-gray-500">ID: #{{ nb.id }}</span>
                    </div>
                    
                    <div class="flex gap-2 flex-wrap">
                        <!-- Open -->
                        <button onclick="openProject({{ nb.id }})" class="px-5 py-2 bg-white/5 hover:bg-white/10 text-white rounded-lg text-xs font-bold transition flex items-center gap-2">
                            <span>OPEN</span>
                        </button>
                        
                        <!-- Export -->
                        <button onclick="exportProject({{ nb.id }})" class="px-4 py-2 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-lg transition" title="Export as .npy">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </button>
                        
                        <!-- Delete -->
                        <button onclick="deleteProject({{ nb.id }})" class="px-4 py-2 bg-n-red/10 hover:bg-n-red/20 text-n-red rounded-lg transition" title="Delete">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="text-center text-gray-600 mt-20 font-nothing text-xl">NO SAVED PROJECTS</div>
        {% endif %}
    </main>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const apiKey = urlParams.get('key');
    if (apiKey) $.ajaxSetup({ headers: { 'X-API-KEY': apiKey } });
    const keyParam = apiKey ? `?key=${apiKey}` : '';

    function openProject(id) {
        // preserve key if exists, append load_id
        const prefix = apiKey ? `?key=${apiKey}&` : '?';
        window.location.href = `/${prefix}load_id=${id}`;
    }

    function renameHistory(id) {
        const currentTitle = $(`#title-${id}`).text();
        const newTitle = prompt("Rename Project:", currentTitle);
        if(!newTitle || newTitle === currentTitle) return;
        
        $.ajax({
            url: `/history/rename/${id}`, 
            type: 'POST', 
            contentType: 'application/json',
            data: JSON.stringify({title: newTitle}),
            success: (res) => {
                $(`#title-${id}`).text(newTitle);
            },
            error: () => alert("Rename failed")
        });
    }

    function exportProject(id) {
        // Direct download link
        const link = document.createElement('a');
        link.href = `/history/export/${id}${keyParam}`;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function deleteProject(id) {
        if(!confirm("Delete this project permanently?")) return;
        $.ajax({
            url: `/history/delete/${id}`, type: 'POST',
            success: () => $(`#nb-${id}`).fadeOut(300, function(){ $(this).remove(); })
        });
    }
</script>
{% endblock %}
